name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "iil_testkit/__init__.py"
      - "pyproject.toml"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target:
        description: "Upload target (pypi or testpypi)"
        required: false
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi

jobs:
  check-version:
    name: Check if version changed
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect version change
        id: check
        run: |
          CURR=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PREV=$(git show HEAD~1:pyproject.toml 2>/dev/null | python3 -c "import tomllib,sys; print(tomllib.load(sys.stdin.buffer)['project']['version'])" 2>/dev/null || echo "0.0.0")
          echo "Current: $CURR, Previous: $PREV"
          if [ "$CURR" != "$PREV" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURR" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREV → $CURR"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURR" >> "$GITHUB_OUTPUT"
            echo "No version change"
          fi

  test:
    name: Tests (publish gate)
    runs-on: ubuntu-latest
    needs: [check-version]
    if: |
      always() && (
        (needs.check-version.result == 'success' && needs.check-version.outputs.changed == 'true') ||
        (needs.check-version.result == 'skipped') ||
        github.event_name == 'workflow_dispatch'
      )
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short --no-cov

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install hatch
        run: pip install hatch

      - name: Read version from pyproject.toml
        id: meta
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build wheel + sdist
        run: hatch build

      - name: Verify dist contents
        run: ls -la dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.meta.outputs.version }}
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'pypi' || github.event.inputs.target == ''))
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-testpypi:
    name: Publish to TestPyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          password: ${{ secrets.TESTPYPI_API_TOKEN }}
